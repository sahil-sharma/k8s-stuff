deploymentMode: SingleBinary
test:
  enabled: false

loki:
  auth_enabled: false

  memberlist:
    service:
      publishNotReadyAddresses: true

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2026-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  rulerConfig:
    alertmanager_url: http://alertmanager-operated.monitoring.svc.cluster.local:9093
    enable_alertmanager_v2: true
    enable_api: true
    ring:
      kvstore:
        store: inmemory
    rule_path: /tmp/loki-rules
    storage:
      type: local
      local:
        directory: /var/loki/rules

  pattern_ingester:
    enabled: true

  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    query_timeout: 5m
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20

  server:
    http_server_read_timeout: 600s
    http_server_write_timeout: 600s
    grpc_server_max_recv_msg_size: 8388608
    grpc_server_max_send_msg_size: 8388608

  ingester:
    chunk_encoding: snappy

  tracing:
    enabled: true

  querier:
    max_concurrent: 1

minio:
  enabled: false

singleBinary:
  replicas: 1
  extraArgs:
    - -config.expand-env=true
  persistence:
    enabled: true
    size: 1Gi
    storageClass: "standard"
    accessModes:
      - ReadWriteOnce
  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 700Mi
  extraEnv:
    - name: GOMEMLIMIT
      value: 1750MiB
  extraVolumes:
    - name: loki-rules
      projected:
        sources:
          - configMap:
              name: loki-rules-postgres
  extraVolumeMounts:
    - name: loki-rules
      mountPath: /var/loki/rules/fake
      readOnly: true

gateway:
  enabled: true
  ingress:
    enabled: false

chunksCache:
  writebackSizeLimit: 100MB

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
