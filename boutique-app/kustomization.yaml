apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: boutique

resources:
  - namespace.yaml
  # The base manifests from Google
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/v0.10.5/release/kubernetes-manifests.yaml
  # If your HPA is in a separate file, keep it here.
  # If it's in the same file as the faulty Deployment, extract it!
  - frontend-hpa.yaml
  - gateway.yaml
  - virtualservice.yaml

patches:
  # This patch targets the existing frontend deployment and injects your changes
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: workload
            operator: Equal
            value: app
            effect: NoSchedule
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
