apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trust-manager-secret-reader
  namespace: cert-manager
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trust-manager-secret-reader-binding
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trust-manager-secret-reader
subjects:
- kind: ServiceAccount
  name: trust-manager
  namespace: trust-manager
