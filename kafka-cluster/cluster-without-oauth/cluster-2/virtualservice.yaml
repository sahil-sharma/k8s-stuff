apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: kafka-gateway
  namespace: cluster-2
spec:
  selector:
    app: istio-gateway
  servers:
    - port:
        number: 9092
        name: tcp-kafka
        protocol: TCP # CRITICAL: Must be TCP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kafka-vs
  namespace: cluster-2
spec:
  hosts:
    - "*"
  gateways:
    - kafka-gateway
  tcp: # CRITICAL: Use 'tcp' block, NOT 'http'
    - match:
        - port: 9092
      route:
        - destination:
            host: cluster-2-kafka-bootstrap.cluster-2.svc.cluster.local
            port:
              number: 9092
