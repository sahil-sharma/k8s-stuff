apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: default
  labels:
    app: kafka-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "9092,9094"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: consumer
          image: kafka-app:v1
          imagePullPolicy: Never
          command: [ "./consumer" ]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "my-cluster-kafka-bootstrap.kafka-cluster.svc.cluster.local:9094"
            - name: KAFKA_TOPIC
              value: "a_topic"
            - name: KAFKA_CONSUMER_GROUP
              value: "a_consumer_group_1"
            - name: KAFKA_DLQ_TOPIC
              value: "a_topic.dlq"
            - name: KAFKA_USERNAME
              value: "a-user"
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: a-user-kafka-creds
                  key: password
            - name: PROCESSING_DELAY_MS
              value: "2000"
            - name: PROCESSING_TIMEOUT
              value: "5s"
            - name: FORCE_FAIL_RATIO
              value: "0.95"
            - name: LOG_LEVEL
              value: "info"
            - name: HEALTH_ADDR
              value: ":8081"
          ports:
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
