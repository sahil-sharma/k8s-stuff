apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: my-cluster-controller
  namespace: kafka-cluster
  labels:
    strimzi.io/cluster: my-cluster
spec:
  replicas: 1
  roles:
    - controller
  storage:
    type: persistent-claim
    size: 1Gi
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: my-cluster-broker
  namespace: kafka-cluster
  labels:
    strimzi.io/cluster: my-cluster
spec:
  replicas: 3
  roles:
    - broker
  storage:
    type: persistent-claim
    size: 1Gi
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
  namespace: kafka-cluster
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafkaExporter:
    template:
      pod:
        metadata:
          annotations:
            traffic.sidecar.istio.io/excludeInboundPorts: "9090,9091,9092,9094"
            traffic.sidecar.istio.io/excludeOutboundPorts: "9090,9091,9092,9094"
    groupRegex: ".*"
    topicRegex: ".*"
    resources:
      requests:
        cpu: 200m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    showAllOffsets: false
    logging: info
    enableSaramaLogging: false
    readinessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 5
    livenessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 5
  kafka:
    version: 4.1.1
    metadataVersion: "4.1"
    jvmOptions:
      "-Xms": "1024m"
      "-Xmx": "1024m"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: scram
        port: 9094
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
      superUsers:
        - User:admin
    config:
      initial.broker.registration.timeout.ms: 300000 # 5min
      broker.heartbeat.interval.ms: 2000
      auto.create.topics.enable: "true"
      strimzi.oauth.ssl.principal.mapping: "true"
      # Other Kafka configuration options
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
    template:
      pod:
        metadata:
          annotations:
            # Tell Istio not to intercept these ports
            traffic.sidecar.istio.io/excludeInboundPorts: "9090,9091,9092,9093,9094"
            traffic.sidecar.istio.io/excludeOutboundPorts: "9090,9091,9092,9093,9094"
      kafkaContainer:
        env:
          - name: STRIMZI_OAUTH_METRIC_REPORTERS
            value: org.apache.kafka.common.metrics.JmxReporter
    logging:
      type: inline
      loggers:
        log4j.logger.io.strimzi: "INFO"
        log4j.logger.kafka: "INFO"
        log4j.logger.org.apache.kafka: "INFO"
    livenessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 5
    readinessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 5
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yaml
  entityOperator:
    template:
      pod:
        metadata:
          annotations:
            traffic.sidecar.istio.io/excludeOutboundPorts: "9091,9092,9093,9094"
    topicOperator: {}
    userOperator: {}
