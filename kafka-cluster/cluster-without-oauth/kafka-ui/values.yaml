env:
  - name: LOGGING_LEVEL_ROOT
    value: INFO

podAnnotations:
  "traffic.sidecar.istio.io/excludeOutboundPorts": "9092,9094"

envs:
  secretMappings:
    KAFKA_PASSWORD:
      name: kafka-ui-kafka-creds
      keyName: password
    KAFKA_CONNECT_PASSWORD:
      name: kafka-ui-kafka-connect-creds
      keyName: KAFKA_CONNECT_PASSWORD

yamlApplicationConfig:
  kafka:
    clusters:
      - name: my-cluster
        bootstrapServers: my-cluster-kafka-bootstrap.kafka-cluster.svc:9094
        properties:
          security.protocol: SASL_PLAINTEXT
          sasl.mechanism: SCRAM-SHA-512
          sasl.jaas.config: >
            org.apache.kafka.common.security.scram.ScramLoginModule required
            username="kafka-ui"
            password="${KAFKA_PASSWORD}";
          socket.connection.setup.timeout.max.ms: 50000
          socket.connection.setup.timeout.ms: 50000
        kafkaConnect:
          - name: strimzi-connect
            address: http://kafka-connect.local.io:32080
            # address: http://strimzi-connect-connect-api.kafka-cluster.svc.cluster.local:8083

  auth:
    type: LOGIN_FORM

  spring:
    security:
      user:
        name: admin
        password: admin123

  dynamic.config.enabled: true

  logging:
    level:
      org.springframework.security: INFO
      io.kafbat.ui.service.rbac: INFO
