apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eso-secret-reader
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-secret-reader-crb
subjects:
  - kind: ServiceAccount
    name: eso-kafka-reader
    namespace: kafka-cluster-2
roleRef:
  kind: ClusterRole
  name: eso-secret-reader
  apiGroup: rbac.authorization.k8s.io
---