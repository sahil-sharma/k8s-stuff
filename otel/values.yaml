mode: deployment

presets:
  logsCollection:
    enabled: true # This often sets up the filelog receiver and RBAC for you
  kubernetesAttributes:
    enabled: true
#   clusterMetrics:
#     enabled: true
#   kubernetesEvents:
#     enabled: true
#   hostMetrics:
#     enabled: true

service:
  enabled: true

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
  extraLabels:
    release: monitoring
  selectorOverride:
    app.kubernetes.io/name: opentelemetry-collector
    app.kubernetes.io/instance: otel-collector
    component: agent-collector

ports:
  metrics:
    enabled: true

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]
    - apiGroups: ["apps"]
      resources: ["replicasets"]
      verbs: ["get", "watch", "list"]

image:
  # repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
  tag: "latest"

config:
  receivers:
    filelog:
      include: [/var/log/pods/*/*/*.log]
      exclude: [/var/log/pods/loki_*/*/*.log]
      start_at: end
      include_file_path: true
      include_file_name: false
      operators:
        - type: container
          id: container-parser
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  connectors:
    servicegraph:
      latency_histogram_buckets: [100ms, 250ms, 1s, 5s, 10s]
      dimensions: []
      store:
        ttl: 5s
        max_items: 1000
  processors:
    batch:
      timeout: 2s
      send_batch_size: 256
    memory_limiter:
      check_interval: 1s
      limit_percentage: 70
      spike_limit_percentage: 30
    k8sattributes:
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.node.name
          - k8s.container.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.name
  exporters:
    otlp/tempo:
      endpoint: tempo.tempo.svc.cluster.local:4317
      tls:
        insecure: true
    otlphttp/loki:
      endpoint: http://logs.local.io:32080/otlp
      tls:
        insecure: true
    debug:
      verbosity: basic
    prometheusremotewrite:
      endpoint: "http://metrics.local.io:32080/api/v1/write"
      resource_to_telemetry_conversion:
        enabled: true
  service:
    telemetry:
      metrics:
        level: detailed
        address: 0.0.0.0:8888
    pipelines:
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo, debug, servicegraph]
      metrics:
        receivers: [otlp, servicegraph]
        processors: [batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [filelog]
        processors: [k8sattributes, memory_limiter, batch]
        exporters: [otlphttp/loki]
