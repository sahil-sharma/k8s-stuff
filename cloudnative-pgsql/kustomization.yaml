apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: cloudnative-pg
    releaseName: cnpg
    version: 0.27.1
    repo: https://cloudnative-pg.github.io/charts
    namespace: cnpg-system
    includeCRDs: true
    valuesInline:
      monitoring:
        podMonitorEnabled: true
        # Add labels so your Prometheus instance can discover the PodMonitor
        podMonitorAdditionalLabels:
          release: monitoring
      monitoringQueriesConfigMap:
        name: cnpg-default-monitoring
