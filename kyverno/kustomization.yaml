apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: kustomization

resources:
  - namespace.yaml

helmCharts:
- name: kyverno
  releaseName: kyverno
  version: 3.8.1
  repo: https://kyverno.github.io/kyverno
  namespace: kyverno
  includeCRDs: true
  valuesFile: values.yaml
