apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: kustomization

resources:
  # - namespace.yaml
  - gateway.yaml
  - virtualserver.yaml

helmCharts:
- name: policy-reporter
  releaseName: policy-reporter
  version: 3.7.4
  repo: https://kyverno.github.io/policy-reporter
  namespace: kyverno
  includeCRDs: true
  valuesFile: values.yaml